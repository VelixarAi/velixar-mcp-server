name: Publish to npm (trusted publishing)

# OIDC trusted publishing: no npm token anywhere. npmjs.com is configured to
# accept publishes ONLY from this repo + this workflow file. Provenance
# attestation is generated automatically.
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write # OIDC token for npm trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # bundles npm >= 11.5 (required for trusted publishing)
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - run: npm publish # prepublishOnly runs the tsc build; OIDC handles auth
